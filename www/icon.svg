<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F0F4FF"/>
    </linearGradient>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.25"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="rgba(255,255,255,0.1)"/>
  <circle cx="420" cy="420" r="80" fill="rgba(255,255,255,0.08)"/>
  <circle cx="400" cy="120" r="30" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Open Book -->
  <g transform="translate(256, 290)" filter="url(#dropShadow)">
    <!-- Book shadow -->
    <ellipse cx="0" cy="100" rx="130" ry="15" fill="rgba(0,0,0,0.2)"/>
    
    <!-- Left page -->
    <path d="M-120,10 Q-120,-60 -60,-80 L0,-50 L0,90 Q-60,60 -120,10 Z" fill="url(#bookGrad)"/>
    <!-- Left page lines -->
    <line x1="-100" y1="-35" x2="-30" y2="-45" stroke="#C7D2FE" stroke-width="5" stroke-linecap="round"/>
    <line x1="-100" y1="-15" x2="-40" y2="-23" stroke="#C7D2FE" stroke-width="5" stroke-linecap="round"/>
    <line x1="-100" y1="5" x2="-35" y2="-1" stroke="#C7D2FE" stroke-width="5" stroke-linecap="round"/>
    <line x1="-100" y1="25" x2="-45" y2="21" stroke="#C7D2FE" stroke-width="5" stroke-linecap="round"/>
    <line x1="-100" y1="45" x2="-40" y2="43" stroke="#C7D2FE" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Right page -->
    <path d="M120,10 Q120,-60 60,-80 L0,-50 L0,90 Q60,60 120,10 Z" fill="url(#bookGrad)"/>
    <!-- Right page lines -->
    <line x1="100" y1="-35" x2="30" y2="-45" stroke="#C7D2FE" stroke-width="5" stroke-linecap="round"/>
    <line x1="100" y1="-15" x2="40" y2="-23" stroke="#C7D2FE" stroke-width="5" stroke-linecap="round"/>
    <line x1="100" y1="5" x2="35" y2="-1" stroke="#C7D2FE" stroke-width="5" stroke-linecap="round"/>
    <line x1="100" y1="25" x2="45" y2="21" stroke="#C7D2FE" stroke-width="5" stroke-linecap="round"/>
    <line x1="100" y1="45" x2="40" y2="43" stroke="#C7D2FE" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Spine -->
    <path d="M-4,-50 L4,-50 L4,90 L-4,90 Z" fill="#E0E7FF"/>
    <line x1="0" y1="-50" x2="0" y2="90" stroke="#C7D2FE" stroke-width="1"/>
  </g>
  
  <!-- Speech bubble with W -->
  <g transform="translate(350, 130)" filter="url(#dropShadow)">
    <circle cx="0" cy="0" r="60" fill="white"/>
    <text x="0" y="22" font-family="Arial, Helvetica, sans-serif" font-size="65" font-weight="bold" fill="#6366F1" text-anchor="middle">W</text>
  </g>
  
  <!-- Small floating letters -->
  <g font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="rgba(255,255,255,0.9)">
    <text x="140" y="180">A</text>
    <text x="180" y="140">B</text>
    <text x="420" y="280">C</text>
  </g>
  
  <!-- Stars/sparkles -->
  <g fill="white" opacity="0.8">
    <polygon points="120,380 125,395 140,395 128,405 133,420 120,410 107,420 112,405 100,395 115,395" transform="scale(0.6) translate(80, 200)"/>
    <polygon points="120,380 125,395 140,395 128,405 133,420 120,410 107,420 112,405 100,395 115,395" transform="scale(0.4) translate(900, 150)"/>
  </g>
</svg>
