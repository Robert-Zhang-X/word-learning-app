<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E0E7FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>
  
  <!-- Open Book -->
  <g transform="translate(256, 280)" filter="url(#shadow)">
    <!-- Left Page -->
    <path d="M-120,0 C-120,-80 -60,-100 0,-60 L0,80 C-60,40 -120,20 -120,0 Z" fill="url(#bookGradient)"/>
    <!-- Right Page -->
    <path d="M120,0 C120,-80 60,-100 0,-60 L0,80 C60,40 120,20 120,0 Z" fill="url(#bookGradient)"/>
    <!-- Book Spine -->
    <path d="M-5,-60 L5,-60 L5,80 L-5,80 Z" fill="#C7D2FE"/>
    <!-- Text Lines on Left Page -->
    <rect x="-100" y="-30" width="70" height="6" rx="3" fill="#A5B4FC"/>
    <rect x="-100" y="-15" width="50" height="6" rx="3" fill="#A5B4FC"/>
    <rect x="-100" y="0" width="60" height="6" rx="3" fill="#A5B4FC"/>
    <rect x="-100" y="15" width="55" height="6" rx="3" fill="#A5B4FC"/>
    <!-- Text Lines on Right Page -->
    <rect x="30" y="-30" width="70" height="6" rx="3" fill="#A5B4FC"/>
    <rect x="30" y="-15" width="50" height="6" rx="3" fill="#A5B4FC"/>
    <rect x="30" y="0" width="60" height="6" rx="3" fill="#A5B4FC"/>
    <rect x="30" y="15" width="55" height="6" rx="3" fill="#A5B4FC"/>
  </g>
  
  <!-- Speech Bubble with "W" -->
  <g transform="translate(340, 120)">
    <circle cx="0" cy="0" r="55" fill="white" filter="url(#shadow)"/>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#6366F1" text-anchor="middle">W</text>
  </g>
  
  <!-- Small Stars -->
  <circle cx="150" cy="150" r="8" fill="white" opacity="0.8"/>
  <circle cx="380" cy="380" r="6" fill="white" opacity="0.6"/>
  <circle cx="120" cy="350" r="5" fill="white" opacity="0.5"/>
</svg>
